<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Photo Gallery</title>
	<link rel="stylesheet" href="css/gallery.css">
	<script src = "js/gallery.js"></script>
</head>
<body onload="setImages()">
	
	<div id = "image">
		Hover over an image below to display here.
	</div>
	
	<img class = "preview" alt = "What a year!" src = "img/2026.jpg" onmouseover = "upDate(this)" onmouseout = "unDo()" >
	
	<img class = "preview" alt = "Let's dream" src = "img/dream.jpg" onmouseover = "upDate(this)" onmouseout = "unDo()">
	
	<img class = "preview" src = "img/open.jpg" alt = "Always open!" onmouseover = "upDate(this)" onmouseout = "unDo()">

	<img class = "preview" src = "img/opening.jpg" alt = "This is the day" onmouseover = "upDate(this)" onmouseout = "unDo()">

	<img class = "preview" src = "img/booster.jpg" alt = "So good" onmouseover = "upDate(this)" onmouseout = "unDo()">

	<img class = "preview" src = "img/paysage.jpg" alt = "So beautiful" onmouseover = "upDate(this)" onmouseout = "unDo()">

</body>
</html>
